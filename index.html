<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101010" />
    <script>
      (function () {
        var t;
        try {
          t = localStorage.getItem('unboxing-theme');
        } catch (e) {}
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = t;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = t === 'light' ? '#faf8f3' : '#101010';
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Unboxing — 2026 가온누리 여름수련회 기도제목</title>

    <!-- Open Graph — 카카오톡 등에서 미리보기 카드로 쓰인다. 배포 도메인이
         바뀌면(예: 커스텀 도메인 연결) og:image·og:url·twitter:image의
         절대경로만 새 도메인으로 바꾸면 된다.
         og:image의 ?v= 는 카카오톡 자체 서버 캐시(디버거 캐시와 별개, URL을 키로
         며칠씩 유지됨)를 우회하기 위한 것 — og_img.png를 새로 교체할 때마다
         이 숫자를 올려야 카톡 채팅에도 새 이미지가 반영된다. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Unboxing" />
    <meta property="og:title" content="Unboxing — 2026 가온누리 여름수련회 기도제목" />
    <meta
      property="og:description"
      content="박스를 열면 랜덤으로 기도제목이 나와요. 함께 기도해요!"
    />
    <meta property="og:image" content="https://gaonnuri-unboxing.netlify.app/og_image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://gaonnuri-unboxing.netlify.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Unboxing — 2026 가온누리 여름수련회 기도제목" />
    <meta
      name="twitter:description"
      content="박스를 열면 랜덤으로 기도제목이 나와요. 함께 기도해요!"
    />
    <meta name="twitter:image" content="https://gaonnuri-unboxing.netlify.app/og_img.png?v=2" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
